name = "nostr-on-near"
main = "worker.js"
compatibility_date = "2024-01-01"

# Durable Objects for WebSocket and session state
[[durable_objects.bindings]]
name = "NostrBunker"
class_name = "NostrBunker"

# Migrations for Durable Objects
[[migrations]]
tag = "v1"
new_classes = ["NostrBunker"]

# Environment variables (set via wrangler secret)
# wrangler secret put RELAYER_ACCOUNT_ID
# wrangler secret put RELAYER_PRIVATE_KEY

# Routes (optional - for custom domain)
# routes = [
#   { pattern = "bunker.yourdomain.com/*", zone_name = "yourdomain.com" }
# ]

# Development settings
[dev]
port = 8787
local_protocol = "http"
